<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Portal</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #334155; border-radius: 12px; padding: 15px; cursor: pointer; }
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; left: 10px; padding: 10px; background: #ef4444; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card" onclick="openGame('https://space-waves-unblocked.github.io')"><h3>Space Waves</h3></div>
        <div class="card" onclick="openGame('https://slope-game.github.io/')"><h3>Slope Mobile</h3></div>
        <div class="card" onclick="openGame('https://retro-bowl-six.vercel.app')"><h3>Retro Bowl</h3></div>
        <div class="card" onclick="openGame('https://3kh0-assets.github.io/subway-surfers/')"><h3>Subway Surfers</h3></div>
        <div class="card" onclick="openGame('https://bitlifeunblockedonline.github.io')"><h3>BitLife</h3></div>
    </div>
    <div id="gameOverlay">
        <button class="close-btn" onclick="closeGame()">CLOSE</button>
        <iframe id="gameFrame" src="" allow="autoplay; fullscreen; keyboard; touch"></iframe>
    </div>
    <script>
        function openGame(url) {
            const frame = document.getElementById('gameFrame');
            frame.src = url;
            document.getElementById('gameOverlay').style.display = 'block';
            frame.focus();
        }
        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
    </script>
</body>
</html>
