<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Drive - My Files</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: #1e293b; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #334155; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; border: 1px solid #475569; }
        .card:hover { transform: scale(1.05); background: #38bdf8; border-color: white; }
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .close-btn { position: absolute; top: 10px; left: 10px; padding: 10px 15px; background: #ef4444; color: white; border-radius: 8px; cursor: pointer; z-index: 1001; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>BlooketPlayer99 Hub</h1>
        <p>Press <b>ESC</b> for Emergency Panic</p>
    </header>

    <div class="grid">
        <!-- 1. SPACE WAVES (Your favorite working link) -->
        <div class="card" onclick="openGame('https://space-waves-unblocked.github.io')">
            <h3>Space Waves</h3>
        </div>

        <!-- 2. SUBWAY SURFERS (New 2026 Mirror) -->
        <div class="card" onclick="openGame('https://rohanchacko.github.io')">
            <h3>Subway Surfers</h3>
        </div>

        <!-- 3. RETRO BOWL (New 2026 Working Link) -->
        <div class="card" onclick="openGame('https://retrobowl.me')">
            <h3>Retro Bowl</h3>
        </div>

        <!-- 4. 2048 (Official GitHub Stable Link) -->
        <div class="card" onclick="openGame('https://gabrielecirulli.github.io/2048/')">
            <h3>2048</h3>
        </div>

        <!-- 5. BITLIFE (Current Mirror) -->
        <div class="card" onclick="openGame('https://bitlifeunblockedonline.github.io')">
            <h3>BitLife</h3>
        </div>
    </div>

    <div id="gameOverlay">
        <button class="close-btn" onclick="closeGame()">[X] CLOSE</button>
        <iframe id="gameFrame" src="" allow="autoplay; fullscreen; keyboard" allowfullscreen></iframe>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }
        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = ''; 
            document.body.style.overflow = 'auto'; 
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") { window.location.replace("https://classroom.google.com"); }
        });
    </script>
</body>
</html>
