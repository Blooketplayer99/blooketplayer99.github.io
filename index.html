<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com">
    <title>Google Drive - My Files</title>
    <style>
        body { background: #0f172a; color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; overflow: hidden; touch-action: manipulation; }
        header { background: #1e293b; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 20px; height: 80vh; overflow-y: auto; }
        .card { background: #334155; border-radius: 12px; padding: 15px; cursor: pointer; border: 1px solid #475569; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .card:hover { transform: scale(1.05); background: #38bdf8; }
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .close-btn { position: absolute; top: 10px; left: 10px; padding: 12px 18px; background: #ef4444; color: white; border-radius: 8px; cursor: pointer; z-index: 1001; border: none; font-weight: bold; font-size: 14px; }
        .bypass-hint { font-size: 10px; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

    <header onclick="panic()">
        <h1>BlooketPlayer99 Hub</h1>
        <p>Tap to Play | <b>Triple-tap/ESC</b> for Panic</p>
    </header>

    <div class="grid">
        <div class="card" onclick="openGame('https://space-waves-unblocked.github.io')"><h3>Space Waves</h3><p class="bypass-hint">WebGL Optimized</p></div>
        <div class="card" onclick="openGame('https://bigfoot67.github.io')"><h3>Moto X3M</h3><p class="bypass-hint">Alternative Mirror</p></div>
        <div class="card" onclick="openGame('https://neruvy.github.io')"><h3>Retro Bowl</h3><p class="bypass-hint">Neruvy Fix</p></div>
        <div class="card" onclick="openGame('https://rohanchacko.github.io')"><h3>Subway Surfers</h3><p class="bypass-hint">WebGL Stable</p></div>
        <div class="card" onclick="openGame('https://lolbeans.io')"><h3>LOL Beans</h3><p class="bypass-hint">Multiplayer</p></div>
        <div class="card" onclick="openGame('https://bitlifeunblockedonline.github.io')"><h3>BitLife</h3><p class="bypass-hint">Text Based</p></div>
    </div>

    <!-- This overlay has fixed sandbox permissions to stop blackscreens -->
    <div id="gameOverlay">
        <button class="close-btn" onclick="closeGame()">[X] CLOSE</button>
        <iframe id="gameFrame" src="" 
            allow="autoplay; fullscreen; keyboard-focus; gamepad; webgl; accelerometer; gyroscope" 
            sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Try to open in a blank tab first to bypass filters, if blocked, use overlay
        function openGame(url) {
            try {
                const win = window.open('about:blank', '_blank');
                if (!win || win.closed) {
                    // Fallback to overlay if popup is blocked
                    const frame = document.getElementById('gameFrame');
                    frame.src = url;
                    document.getElementById('gameOverlay').style.display = 'block';
                    setTimeout(() => { frame.focus(); }, 1000);
                } else {
                    // Injecting the game into a clean, untraceable blank tab
                    win.document.title = "Google Docs";
                    win.document.body.style.margin = '0';
                    win.document.body.style.height = '100vh';
                    win.document.body.style.overflow = 'hidden';
                    const iframe = win.document.createElement('iframe');
                    iframe.style.border = 'none';
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.src = url;
                    iframe.allow = "autoplay; fullscreen; keyboard-focus; gamepad; webgl";
                    win.document.body.appendChild(iframe);
                }
            } catch (e) {
                console.log("Popup blocked, using overlay.");
            }
        }
        
        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = ''; 
        }
        
        function panic() {
            window.location.replace("https://www.ixl.com");
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") { panic(); }
        });

        let lastTap = 0;
        let tapCount = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 600 && tapLength > 0) { tapCount++; } else { tapCount = 1; }
            if (tapCount >= 3) { panic(); }
            lastTap = currentTime;
        });
    </script>
</body>
</html>
